<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

<div class="container">
    <h2 class="my-4">Agregar Producto</h2>

    <div class="card">
        <div class="card-header">
            <h3>Formulario para Agregar Producto</h3>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data" action="{% url 'agregar' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre del Producto</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required aria-describedby="nombreHelp">
                    <small id="nombreHelp" class="form-text text-muted">Ingresa el nombre del producto.</small>
                </div>
                <div class="mb-3">
                    <label for="descripcion" class="form-label">Descripción</label>
                    <textarea class="form-control" id="descripcion" name="descripcion" rows="3" required aria-describedby="descripcionHelp"></textarea>
                    <small id="descripcionHelp" class="form-text text-muted">Escribe una breve descripción del producto.</small>
                </div>
                <div class="mb-3">
                    <label for="precio" class="form-label">Precio</label>
                    <input type="number" step="0.01" class="form-control" id="precio" name="precio" required aria-describedby="precioHelp">
                    <small id="precioHelp" class="form-text text-muted">Introduce el precio del producto en pesos.</small>
                </div>
                <div class="mb-3">
                    <label for="stock" class="form-label">Stock</label>
                    <input type="number" class="form-control" id="stock" name="stock" required aria-describedby="stockHelp">
                    <small id="stockHelp" class="form-text text-muted">Cantidad de producto disponible en stock.</small>
                </div>
                <div class="mb-3">
                    <label for="imagen" class="form-label">Imagen del Producto</label>
                    <input type="file" class="form-control" id="imagen" name="imagen" aria-describedby="imagenHelp">
                    <small id="imagenHelp" class="form-text text-muted">Seleccione una imagen para el producto (opcional).</small>
                </div>
                <button type="submit" class="btn btn-primary">Agregar Producto</button>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz4fnFO9gybRyZYmAyD5WJ9dQy0EK0Bhb3kT4zBsV4dPp3oD3LoJKh/fpN4" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-pzjw8f+ua7Kw1TIq0r97HmvbmPBnXxjtz1z5Hknt7b07zjXkTbxoU5YB+q51l7p1" crossorigin="anonymous"></script>

</body>
</html>
